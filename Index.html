<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hype Fit - Seu Desconto</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            background: linear-gradient(135deg, #d8b4fe 0%, #bbf7d0 50%, #a7f3d0 100%);
            background-attachment: fixed;
            padding: 20px;
            text-align: center;
        }

        .logo { width: 90%; max-width: 400px; margin-bottom: 30px; }

        /* Animação para a frase */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .frase-destaque {
            font-size: 1.2rem;
            font-weight: bold;
            color: #4b5563;
            margin-bottom: 20px;
            animation: fadeIn 2s ease-out;
        }

        /* Animação de Pulsação */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .btn {
            padding: 20px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            animation: pulse 2s infinite ease-in-out;
            color: white;
            text-decoration: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn-principal { background-color: #7c3aed; } /* Lilás */
        .btn-modal { background-color: #059669; }     /* Verde */

        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(10px);
            justify-content: center; align-items: center; padding: 20px;
        }
        .modal-content { 
            background: white; padding: 40px; border-radius: 30px; 
            text-align: center; max-width: 400px; width: 100%;
        }
    </style>
</head>
<body>

    <img src="ON HYPE FIT 2026.png" class="logo">
    
    <p class="frase-destaque">Parabéns! Clique no botão abaixo para obter seu cupom de desconto.</p>
    
    <button class="btn btn-principal" onclick="abrirModal()">Obter meu cupom de desconto</button>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 style="color: #7c3aed; margin-bottom: 15px;">Parabéns!</h2>
            <p style="margin-bottom: 25px;">Você acaba de ganhar 10% de desconto em qualquer produto da <strong>ON HYPE FIT</strong>.</p>
            <button class="btn btn-modal" onclick="enviarMensagem()">Quero meu cupom</button>
        </div>
    </div>

    <script>
        function abrirModal() {
            confetti({
                particleCount: 250,
                spread: 180,
                origin: { y: 0.5 }
            });
            document.getElementById('modal').style.display = 'flex';
        }

        function enviarMensagem() {
            const numero = "559991583550";
            const mensagem = encodeURIComponent('Olá, vim garantir meu cupom de 10% de desconto "JULIANA10". Me envia as opções dos combos, quero garantir o meu combo com 10% OFF!');
            window.open(`https://wa.me/${numero}?text=${mensagem}`, '_blank');
        }
    </script>
</body>
</html>
